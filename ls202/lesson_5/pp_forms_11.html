<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem 11</title>
</head>
<body>
    <form action="#" method="get">
        <fieldset>
            <dl>
                <dt><label for="category">Category</label></dt>
                <dd>
                    <select size="5" id="category">
                        <option disabled>Choose a category</option>
                        <option value="core">Core</option>
                        <option value="plugins">Plugins and Libraries</option>
                        <option value="conventions">Conventions</option>
                        <option value="reviews">Reviews</option>
                        <option value="opinion">Opinion</option>
                        <option value="people">People</option>
                    </select>
                </dd>

                <dt><label for="tags">Tags</label></dt>
                <dd>
                    <select name="tags" id="tags" size="5" multiple>
                        <option disabled>Choose tags that apply</option>
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="javascript">Javascript</option>
                        <option value="ruby">Ruby</option>
                        <option value="rails">Rails</option>
                        <option value="python">Python</option>
                        <option value="django">Django</option>
                    </select>
                </dd>
            </dl>

            <input type="submit" value="Filter">
            <input type="reset">
        </fieldset>
    </form>
    
</body>
</html>
