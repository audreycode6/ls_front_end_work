<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css_reset.css">
    <link rel="stylesheet" href="todo_list.css">
    <title>Todo List</title>
</head>
<body>
    <div class="container">
        <input type="checkbox" id="navbar-hamburger">

        <nav class="expandable">
            <div class="list-logo-and-title">
                <img alt="All Todos symbol" src="assessment_209/all-todos.png">
                <h2>All Todos</h2>
                <span>18</span>
            </div>
            <ul>
                <li class="active">
                    <a href="#">
                        <dl>
                            <dt>02/16</dt>
                            <dd>8</dd>
                        </dl>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <dl>
                            <dt>03/16</dt>
                            <dd>2</dd>
                        </dl>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <dl>
                            <dt>04/16</dt>
                            <dd>1</dd>
                        </dl>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <dl>
                            <dt>05/16</dt>
                            <dd>1</dd>
                        </dl>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <dl>
                            <dt>06/16</dt>
                            <dd>1</dd>
                        </dl>
                    </a>
                </li>
            </ul>

            <div class="list-logo-and-title">
                <img alt="Completed symbol" src="assessment_209/done.png">
                <h2>Completed</h2>
            </div>
            <ul class="completed">
                <li>02/15</li>
                <li>03/15</li>
                <li>04/15</li>
                <li>05/15</li>
                <li>06/14</li>
            </ul>
        </nav>
        <main>
            <div class="navbar-toggle">
                <label for="navbar-hamburger">
                    <img alt="nav bar toggle" src="assessment_209/hamburger.png">
                </label>
            </div>
            <header>
                <h1>02/16</h1>
                <h2>8</h2>
            </header>
            <div>
                <img src="assessment_209/plus.png" alt="Add new to do">
                <a href="#">Add new to do</a>
                <ul>
                    <!-- todo maybe they get in box rather than nesting in ul -->
                    <input type="checkbox" id="edit-item">
                    <div class="item-modal">
                        <form action="" method="get">
                            <div>
                                <label for="title">Title</label>
                                <input type="text" name="title" id="title" value="Item 2" required>
                            </div>
                            <div>
                                <label for="due-date">Due Date</label>
                                <div class="date-selection">
                                    <select name="due-date" id="day">
                                        <option disable>Day</option>
                                        <option selected>16</option>
                                    </select> /
                                    <select name="due-date" id="month">
                                        <option disable>Month</option>
                                    </select> /
                                    <select name="due-date" id="year">
                                        <option disable>Year</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label for="description">Description</label>
                                <textarea name="description" placeholder="Description"></textarea>
                            </div>
                            <div class="form-2-btns"><!--
                                --><input type="submit" class="button" value="Save"><!--
                                --><input type="submit" class="button" value="Mark as Complete">
                            </div>
                        </form>
                    </div>

                    <li>
                        <img class="tickbox" src="assessment_209/unticked-box.png" alt="Unticked todo item">
                        <label for="edit-item">Item 1</label>
                        <img src="assessment_209/trash.png" alt="Delete todo item" class="float-right">
                    </li>
                    <li>
                        <img class="tickbox" src="assessment_209/unticked-box.png" alt="Unticked todo item">
                        Item 2
                        <img src="assessment_209/trash.png" alt="Delete todo item" class="float-right">
                    </li>
                    <li class="completed">
                        <img class="tickbox" src="assessment_209/ticked-box.png" alt="Ticked todo item">
                        Item 3
                        <img src="assessment_209/trash.png" alt="Delete todo item" class="float-right">
                    </li>
                    <li class="completed">
                        <img class="tickbox" src="assessment_209/ticked-box.png" alt="Ticked todo item">
                        Item 4
                        <img src="assessment_209/trash.png" alt="Delete todo item" class="float-right">
                    </li>
                    <li class="completed">
                        <img class="tickbox" src="assessment_209/ticked-box.png" alt="Ticked todo item">
                        Item 5
                        <img src="assessment_209/trash.png" alt="Delete todo item" class="float-right">
                    </li>
                    <li>
                        <img class="tickbox" src="assessment_209/unticked-box.png" alt="Unticked todo item">
                        Item 6
                        <img src="assessment_209/trash.png" alt="Delete todo item" class="float-right">
                    </li>
                    <li>
                        <img class="tickbox" src="assessment_209/unticked-box.png" alt="Unticked todo item">
                        Item 7
                        <img src="assessment_209/trash.png" alt="Delete todo item" class="float-right">
                    </li>
                    <li>
                        <img class="tickbox" src="assessment_209/unticked-box.png"  alt="Unticked todo item">
                        Item 8
                        <img src="assessment_209/trash.png" alt="Delete todo item" class="float-right">
                    </li>
                    <li>
                        <img class="tickbox" src="assessment_209/unticked-box.png"  alt="Unticked todo item">
                        Item 9
                        <img src="assessment_209/trash.png" alt="Delete todo item" class="float-right">
                    </li>
                </ul>
            </div>
        </main>
    </div>
    
</body>
</html>
